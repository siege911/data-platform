version: 2

models:

  # ── Bronze ──────────────────────────────────────────────
  - name: bronze_entraid_users
    description: >
      Bronze view over the raw Airbyte Entra ID users table.
      Snake_case column names, no type casting.
    columns:
      - name: user_id
        description: "Entra ID object ID (Microsoft Graph user ID)"
        tests:
          - not_null
      - name: user_principal_name
        description: "User Principal Name / email from Entra ID"
        tests:
          - not_null
      - name: display_name
        description: "Full display name from Entra ID"
      - name: mail
        description: "Primary SMTP email address"
      - name: job_title
        description: "Job title from Entra ID"
      - name: department
        description: "Department from Entra ID"
      - name: account_enabled
        description: "Whether the Entra ID account is enabled"
      - name: employee_id
        description: "Employee ID if populated in Entra ID"

  # ── Silver: stg_staff (Golden Record) ───────────────────
  - name: stg_staff
    description: >
      Golden record for internal staff identity. One row per internal
      staff member, sourced from Entra ID. External/guest users are
      excluded. All downstream SaaS models reference staff_id from
      this table via staff_source_xref.
    columns:
      - name: staff_id
        description: "Platform-generated UUID. FK target for all other tables."
        tests:
          - unique
          - not_null
      - name: ms_graph_id
        description: "Microsoft Entra ID object ID."
        tests:
          - unique
          - not_null
      - name: email
        description: "Primary email (lowercased, trimmed). Universal match key."
        tests:
          - unique
          - not_null
      - name: first_name
        description: "Given name from Entra ID."
      - name: last_name
        description: "Surname from Entra ID."
      - name: display_name
        description: "Display name from Entra ID."
        tests:
          - not_null
      - name: job_title
        description: "Job title from Entra ID."
      - name: department
        description: "Department from Entra ID."
      - name: phone
        description: "Phone — prefers mobilePhone, falls back to first businessPhones entry."
      - name: is_active
        description: "Derived from Entra ID accountEnabled flag."
        tests:
          - not_null
      - name: erp_employee_id
        description: "Employee ID from Entra ID employeeId field, or from ERP integration."
      - name: _source_updated_at
        tests:
          - not_null
      - name: _loaded_at
        tests:
          - not_null
      - name: _updated_at
        tests:
          - not_null

  # ── Silver: staff_source_xref ───────────────────────────
  - name: staff_source_xref
    description: >
      Cross-reference mapping staff_id to native user IDs in each
      connected SaaS system. One row per staff x source system.
    columns:
      - name: surrogate_key
        description: "Deterministic key for incremental merge."
        tests:
          - unique
          - not_null
      - name: staff_id
        description: "FK to stg_staff."
        tests:
          - not_null
          - relationships:
              to: ref('stg_staff')
              field: staff_id
      - name: source_system
        description: "Canonical source name (e.g., microsoft_365)."
        tests:
          - not_null
          - accepted_values:
              values: ['microsoft_365']
              config:
                severity: warn
      - name: source_user_id
        tests:
          - not_null