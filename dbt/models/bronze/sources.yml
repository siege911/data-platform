version: 2

sources:
  - name: bronze_raw
    description: "Raw Airbyte tables in the bronze schema"
    schema: bronze
    tables:
      - name: entra_idusers
        description: >
          Raw Entra ID (Microsoft Graph) user data loaded by Airbyte.
          Uses the newer Airbyte flat-column format (not JSONB _airbyte_data).
          May contain duplicates across syncs.